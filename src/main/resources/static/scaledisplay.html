<!DOCTYPE html>
<html lang="en">
<head>
    <title>Scale Display</title>
</head>
<body>
<label for="root">Choose a root note:</label>
<select name="root" id="root">
    <option value="C" selected>C</option>
    <option value="Db" >C#/Db</option>
    <option value="D">D</option>
    <option value="Eb">D#/Eb</option>
    <option value="E">E</option>
    <option value="F">F</option>
    <option value="Gb">F#/Gb</option>
    <option value="G">G</option>
    <option value="Ab">G#/Ab</option>
    <option value="A">A</option>
    <option value="Bb">A#/Bb</option>
    <option value="B">B</option>
</select>

<label for="scale-type">Choose a scale type:</label>
<select name="scale-type" id="scale-type">
    <option value="major" selected>Major</option>
    <option value="minor" >Minor</option>
    <option value="major-pentatonic">Major Pentatonic</option>
    <option value="minor-pentatonic">Minor Pentatonic</option>
    <option value="major-blues">Major Blues</option>
    <option value="minor-blues">Minor Blues</option>
    <option value="diminished">Diminished</option>
    <option value="augmented">Augmented</option>
    <option value="harmonic-minor">Harmonic Minor</option>
    <option value="melodic-minor">Melodic Minor</option>
    <option value="half-whole">Half Whole</option>
    <option value="mode-text" disabled>Modal Options</option>
    <option value="dorian">Whole Half</option>
    <option value="phrygian">Whole Half</option>
    <option value="lydian">Whole Half</option>
    <option value="mixolydian">Whole Half</option>
    <option value="locrian">Whole Half</option>
</select>

<button onclick="fetchScale()">Get Scale</button>

<div id="result"></div>
<button id="audio-btn" onclick="playAudio()">play awesome audio</button>
<script src="index.js"></script>
</body>
</html>
