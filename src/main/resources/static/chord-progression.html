<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Theory Website - Chord Progression Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="stylesheet" href="css/style.css">
    <base href="/chord-progression" />
</head>
<body>
<div class="container">
    <header>
        <h1>Music Theory Website</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="scale.html">Learn Scales</a>
        <a href="chord.html">Learn Chords</a>
        <a class="active" href="chord-progression.html">Make Chord Progressions</a>
        <a href="chord-symbol-chart.html">Chord Symbol Chart</a>
        <a href="circle-of-fifths.html">Circle of Fifths</a>
    </nav>

    <label for="root">Choose a root note:</label>
    <select name="root" id="root">
        <option value="C" selected>C</option>
        <option value="Db" >C#/Db</option>
        <option value="D">D</option>
        <option value="Eb">D#/Eb</option>
        <option value="E">E</option>
        <option value="F">F</option>
        <option value="Gb">F#/Gb</option>
        <option value="G">G</option>
        <option value="Ab">G#/Ab</option>
        <option value="A">A</option>
        <option value="Bb">A#/Bb</option>
        <option value="B">B</option>
    </select>

    <label for="progression-type">Choose a scale type:</label>
    <select name="progression-type" id="progression-type">
        <option value="I_IV_V" selected>I-IV-V</option>
        <option value="I_iv_IV_V" selected>I-vi-IV-V</option>
        <option value="ii_V_I" selected>ii-V-I</option>
    </select>

    <button onclick="fetchProgression()">Get Progression</button>

    <div id="result"></div>

    <footer>
        <div class="social-links">
            <a target="_blank" href="https://github.com/azb333">GitHub</a>
            <a target="_blank" href="https://www.linkedin.com/in/aleqzanderbaker/">LinkedIn</a>
        </div>
    </footer>
</div>

<script src="/index.js"></script>
</body>
</html>
