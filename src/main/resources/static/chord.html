<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Theory Website - Learn Chords</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="stylesheet" href="css/style.css">
    <base href="/chord" />
</head>
<body>
<div class="container">
    <header>
        <h1>Music Theory Website</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="scale.html">Learn Scales</a>
        <a class="active" href="chord.html">Learn Chords</a>
        <a href="chord-progression.html">Make Chord Progressions</a>
        <a href="chord-symbol-chart.html">Chord Symbol Chart</a>
        <a href="circle-of-fifths.html">Circle of Fifths</a>
    </nav>

    <label for="root">Choose a root note:</label>
    <select name="root" id="root">
        <option value="C" selected>C</option>
        <option value="Db" >C#/Db</option>
        <option value="D">D</option>
        <option value="Eb">D#/Eb</option>
        <option value="E">E</option>
        <option value="F">F</option>
        <option value="Gb">F#/Gb</option>
        <option value="G">G</option>
        <option value="Ab">G#/Ab</option>
        <option value="A">A</option>
        <option value="Bb">A#/Bb</option>
        <option value="B">B</option>
    </select>

    <label for="chord-type">Choose a scale type:</label>
    <select name="chord-type" id="chord-type">
        <option value="major" selected>Major</option>
        <option value="minor" >Minor</option>
        <option value="sus_two">Sus Two</option>
        <option value="sus_four">Sus Four</option>
        <option value="augmented">Augmented</option>
        <option value="diminished">Diminished</option>
        <option value="major_seventh">Major Seventh</option>
        <option value="minor_seventh">Minor Seventh</option>
        <option value="dominant_seventh">Dominant Seventh</option>
        <option value="diminished_seventh">Diminished Seventh</option>
        <option value="half_diminished_seventh">Half Diminished Seventh</option>
        <option value="minor_major_seventh">Minor Major Seventh</option>
    </select>

    <button onclick="fetchChord()">Get Chord</button>

    <div id="result"></div>
    <script src="index.js"></script>

    <!-- Piano Keyboard -->
    <div class="piano-container">
        <div class="piano-wrapper">
            <ul class="piano">
                <li class="key">
                    <span onclick="playNote('C3.wav')" class="white-key" id="C3"></span>
                    <span onclick="playNote('audiofiles/Db3.wav')" class="black-key" id="Db3"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('audiofiles/D3.wav')" class="white-key" id="D3"></span>
                    <span onclick="playNote('audiofiles/Eb3.wav')" class="black-key" id="Eb3"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('audiofiles/E3.wav')" class="white-key" id="E3"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('F3.wav')" class="white-key" id="F3"></span>
                    <span onclick="playNote('Fs3.wav')" class="black-key" id="Gb3"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('G3.wav')" class="white-key" id="G3"></span>
                    <span onclick="playNote('Gs3.wav')" class="black-key" id="Ab3"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('A3.wav')" class="white-key" id="A3"></span>
                    <span onclick="playNote('As3.wav')" class="black-key" id="Bb3"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('B3.wav')" class="white-key" id="B3"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('C4.wav')" class="white-key" id="C4"></span>
                    <span onclick="playNote('Cs4.wav')" class="black-key" id="Db4"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('D4.wav')" class="white-key" id="D4"></span>
                    <span onclick="playNote('Ds4.wav')" class="black-key" id="Eb4"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('E4.wav')" class="white-key" id="E4"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('F4.wav')" class="white-key" id="F4"></span>
                    <span onclick="playNote('Fs4.wav')" class="black-key" id="Gb4"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('G4.wav')" class="white-key" id="G4"></span>
                    <span onclick="playNote('Gs4.wav')" class="black-key" id="Ab4"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('A4.wav')" class="white-key" id="A4"></span>
                    <span onclick="playNote('As4.wav')" class="black-key" id="Bb4"></span>
                </li>
                <li class="key">
                    <span onclick="playNote('B4.wav')" class="white-key" id="B4"></span>
                </li>
            </ul>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a target="_blank" href="https://github.com/azb333">GitHub</a>
            <a target="_blank" href="https://www.linkedin.com/in/aleqzanderbaker/">LinkedIn</a>
        </div>
    </footer>
</div>

<script src="/index.js"></script>
</body>
</html>
