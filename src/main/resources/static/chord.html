<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Theory Website - Learn Chords</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="stylesheet" href="css/style.css">
    <base href="/chord" />
</head>
<body>
<div class="container">
    <header>
        <h1>Music Theory Website</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="scale.html">Learn Scales</a>
        <a class="active" href="chord.html">Learn Chords</a>
        <a href="chord-progression.html">Make Chord Progressions</a>
        <a href="chord-symbol-chart.html">Chord Symbol Chart</a>
        <a href="circle-of-fifths.html">Circle of Fifths</a>
    </nav>

    <div class="select-group">
        <div class="select-wrapper">
            <label for="root">Root Note</label>
            <select name="root" id="root" onchange="fetchChord()">
                <option value="C" selected>C</option>
                <option value="Db">C# / Db</option>
                <option value="D">D</option>
                <option value="Eb">D# / Eb</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="Gb">F# / Gb</option>
                <option value="G">G</option>
                <option value="Ab">G# / Ab</option>
                <option value="A">A</option>
                <option value="Bb">A# / Bb</option>
                <option value="B">B</option>
            </select>
        </div>

        <div class="select-wrapper">
            <label for="chord-type">Chord Type</label>
            <select name="chord-type" id="chord-type" onchange="fetchChord()">
                <option value="major" selected>Major</option>
                <option value="minor">Minor</option>
                <option value="sus_two">Sus Two</option>
                <option value="sus_four">Sus Four</option>
                <option value="augmented">Augmented</option>
                <option value="diminished">Diminished</option>
                <option value="major_seventh">Major Seventh</option>
                <option value="minor_seventh">Minor Seventh</option>
                <option value="dominant_seventh">Dominant Seventh</option>
                <option value="diminished_seventh">Diminished Seventh</option>
                <option value="half_diminished_seventh">Half Diminished Seventh</option>
                <option value="minor_major_seventh">Minor Major Seventh</option>
            </select>
        </div>
    </div>
    <button onclick="playChord()">Play Chord</button>
    <button onclick="bedazzleChord()">Bedazzle Chord</button>

    <div id="result"></div>

    <!-- Piano Keyboard -->
    <div id="piano-container" class="piano-container">
    </div>

    <footer>
        <div class="social-links">
            <a target="_blank" href="https://github.com/azb333">GitHub</a>
            <a target="_blank" href="https://www.linkedin.com/in/aleqzanderbaker/">LinkedIn</a>
        </div>
    </footer>
</div>

<script src="/index.js"></script>
</body>
</html>
