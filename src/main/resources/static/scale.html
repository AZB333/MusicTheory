<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Theory Website - Learn Scales</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="stylesheet" href="css/style.css">
    <base href="/scale" />
</head>
<body>
<div class="container">
    <header>
        <h1>Music Theory Website</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a class="active" href="scale.html">Learn Scales</a>
        <a href="chord.html">Learn Chords</a>
        <a href="chord-progression.html">Make Chord Progressions</a>
        <a href="chord-symbol-chart.html">Chord Symbol Chart</a>
        <a href="circle-of-fifths.html">Circle of Fifths</a>
    </nav>

    <div class="select-group">
        <div class="select-wrapper">
            <label for="root">Choose a root note:</label>
            <select name="root" id="root" onchange="fetchScale()">
                <option value="C" selected>C</option>
                <option value="Db" >C#/Db</option>
                <option value="D">D</option>
                <option value="Eb">D#/Eb</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="Gb">F#/Gb</option>
                <option value="G">G</option>
                <option value="Ab">G#/Ab</option>
                <option value="A">A</option>
                <option value="Bb">A#/Bb</option>
                <option value="B">B</option>
            </select>


            <div class="select-wrapper">
            <label for="scale-type">Choose a scale type:</label>
            <select name="scale-type" id="scale-type" onchange="fetchScale()">
                <option value="major" selected>Major</option>
                <option value="natural_minor" >Minor</option>
                <option value="harmonic_minor">Harmonic Minor</option>
                <!--        need to work on this still since it is different up and down-->
                <!--        <option value="melodic_minor">Melodic Minor</option>-->
                <option value="major_pentatonic">Major Pentatonic</option>
                <option value="minor_pentatonic">Minor Pentatonic</option>
                <option value="major_blues">Major Blues</option>
                <option value="minor_blues">Minor Blues</option>
                <option value="augmented">Augmented</option>
                <option value="diminished">Diminished</option>
                <option value="half_whole">Half Whole</option>
                <option value="mode_text" disabled>Modal Options</option>
                <option value="ionian">Ionian (Major)</option>
                <option value="dorian">Dorian</option>
                <option value="phrygian">Phrygian</option>
                <option value="lydian">Lydian</option>
                <option value="mixolydian">Mixolydian</option>
                <option value="aeolian">Aeolian (Minor)</option>
                <option value="locrian">Locrian</option>
            </select>
        </div>
    </div>

    <div id="result"></div>
    <script src="index.js"></script>

    <!-- Piano Keyboard -->
    <div id="piano-container" class="piano-container">
    </div>

    <footer>
        <div class="social-links">
            <a target="_blank" href="https://github.com/azb333">GitHub</a>
            <a target="_blank" href="https://www.linkedin.com/in/aleqzanderbaker/">LinkedIn</a>
        </div>
    </footer>
</div>
</div>

<script src="/index.js"></script>
</body>
</html>
